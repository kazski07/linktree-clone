<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Linktree Clone</title>
    <!-- Connects the HTML layout to your CSS styling sheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Main card layout container -->
    <div class="card-container">
        
        <!-- Profile Header Section -->
        <img class="profile-pic" src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=800&auto=format&fit=crop" alt="Profile Picture">
        <h1 class="username">@Andrea Castillo</h1>
        <p class="description">Digital Creator & Web Developer</p>
        
        <!-- Links Hub Wrapper Container -->
        <div class="links-container">
            <a class="link-btn" href="https://www.instagram.com/heartcl4iro?igsh=MTM0Z2hwNzM4bWVvOA==" target="_blank">Instagram</a>
            <a class="link-btn" href="https://www.tiktok.com/" target="_blank">TikTok</a>
            <a class="link-btn" href="https://www.youtube.com/" target="_blank">YouTube</a>
            <a class="link-btn" href="https://www.behance.net/" target="_blank">Portfolio</a>
             
        </div>
        
    </div>


</body>
</html>
